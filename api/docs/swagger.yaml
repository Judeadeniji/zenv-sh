basePath: /v1
definitions:
  api_internal_handler.AddMemberRequest:
    properties:
      role:
        description: admin, senior_dev, dev, contractor, ci_bot
        type: string
      user_id:
        type: string
    type: object
  api_internal_handler.BulkFetchRequest:
    properties:
      environment:
        type: string
      name_hashes:
        description: base64-encoded HMAC hashes
        items:
          type: string
        type: array
      project_id:
        type: string
    type: object
  api_internal_handler.CreateOrgRequest:
    properties:
      name:
        type: string
    type: object
  api_internal_handler.CreateProjectRequest:
    properties:
      name:
        type: string
      organization_id:
        type: string
      project_salt:
        description: base64 — generated client-side
        type: string
      wrapped_project_dek:
        description: base64 — Project DEK wrapped with Project KEK
        type: string
      wrapped_project_vault_key:
        description: base64 — Project Vault Key wrapped with user's public key
        type: string
    type: object
  api_internal_handler.CreateSecretRequest:
    properties:
      ciphertext:
        description: base64 AES-256-GCM encrypted item JSON
        type: string
      environment:
        type: string
      name_hash:
        description: base64 HMAC-SHA256 of secret name
        type: string
      nonce:
        description: base64 96-bit nonce
        type: string
      project_id:
        type: string
    type: object
  api_internal_handler.CreateTokenRequest:
    properties:
      environment:
        description: development | staging | production
        type: string
      expires_at:
        description: optional RFC3339
        type: string
      name:
        type: string
      permission:
        description: read | read_write
        type: string
      project_id:
        type: string
    type: object
  api_internal_handler.CreateTokenResponse:
    properties:
      created_at:
        type: string
      environment:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      permission:
        type: string
      project_id:
        type: string
      token:
        description: shown exactly once — never stored
        type: string
    type: object
  api_internal_handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  api_internal_handler.ListMembersResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/api_internal_handler.MemberResponse'
        type: array
    type: object
  api_internal_handler.ListOrgsResponse:
    properties:
      organizations:
        items:
          $ref: '#/definitions/api_internal_handler.OrgResponse'
        type: array
    type: object
  api_internal_handler.ListProjectsResponse:
    properties:
      projects:
        items:
          $ref: '#/definitions/api_internal_handler.ProjectResponse'
        type: array
    type: object
  api_internal_handler.ListSecretsResponse:
    properties:
      secrets:
        items:
          $ref: '#/definitions/api_internal_handler.SecretListItem'
        type: array
    type: object
  api_internal_handler.ListTokensResponse:
    properties:
      tokens:
        items:
          $ref: '#/definitions/api_internal_handler.TokenListItem'
        type: array
    type: object
  api_internal_handler.MeResponse:
    properties:
      email:
        type: string
      salt:
        description: base64
        type: string
      vault_key_type:
        type: string
      vault_setup_complete:
        type: boolean
      vault_unlocked:
        type: boolean
    type: object
  api_internal_handler.MemberResponse:
    properties:
      email:
        type: string
      id:
        type: string
      joined_at:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  api_internal_handler.OrgResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
    type: object
  api_internal_handler.ProjectCryptoResponse:
    properties:
      project_salt:
        description: base64
        type: string
      wrapped_project_dek:
        description: base64
        type: string
    type: object
  api_internal_handler.ProjectResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      organization_id:
        type: string
    type: object
  api_internal_handler.RollbackRequest:
    properties:
      version:
        type: integer
    type: object
  api_internal_handler.SecretListItem:
    properties:
      environment:
        type: string
      id:
        type: string
      name_hash:
        type: string
      updated_at:
        type: string
      version:
        type: integer
    type: object
  api_internal_handler.SecretResponse:
    properties:
      ciphertext:
        type: string
      created_at:
        type: string
      environment:
        type: string
      id:
        type: string
      name_hash:
        type: string
      nonce:
        type: string
      project_id:
        type: string
      updated_at:
        type: string
      version:
        type: integer
    type: object
  api_internal_handler.SetupVaultRequest:
    properties:
      auth_key_hash:
        description: base64
        type: string
      public_key:
        description: base64
        type: string
      salt:
        description: base64
        type: string
      vault_key_type:
        description: '"pin" or "passphrase"'
        type: string
      wrapped_dek:
        description: base64
        type: string
      wrapped_private_key:
        description: base64
        type: string
    type: object
  api_internal_handler.SetupVaultResponse:
    properties:
      user_id:
        type: string
      vault_setup_complete:
        type: boolean
    type: object
  api_internal_handler.TokenListItem:
    properties:
      created_at:
        type: string
      environment:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      permission:
        type: string
      project_id:
        type: string
      revoked_at:
        type: string
    type: object
  api_internal_handler.UnlockRequest:
    properties:
      auth_key_hash:
        description: base64
        type: string
    type: object
  api_internal_handler.UnlockResponse:
    properties:
      public_key:
        description: base64
        type: string
      wrapped_dek:
        description: base64
        type: string
      wrapped_private_key:
        description: base64
        type: string
    type: object
  api_internal_handler.UpdateSecretRequest:
    properties:
      ciphertext:
        description: base64
        type: string
      nonce:
        description: base64
        type: string
    type: object
  api_internal_handler.VersionItem:
    properties:
      created_at:
        type: string
      version:
        type: integer
    type: object
  api_internal_handler.VersionsResponse:
    properties:
      current_version:
        type: integer
      versions:
        items:
          $ref: '#/definitions/api_internal_handler.VersionItem'
        type: array
    type: object
host: api.zenv.sh
info:
  contact: {}
  description: Zero-knowledge secret manager API. Stores and retrieves ciphertext.
    Never decrypts.
  title: zEnv API
  version: 0.1.0
paths:
  /auth/me:
    get:
      description: Returns identity, vault setup status, and vault lock state.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.MeResponse'
      security:
      - SessionAuth: []
      summary: Get auth state
      tags:
      - auth
  /auth/setup-vault:
    post:
      consumes:
      - application/json
      description: Store client-generated crypto material and link to authenticated
        identity.
      parameters:
      - description: Crypto material from client
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.SetupVaultRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api_internal_handler.SetupVaultResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Setup vault
      tags:
      - auth
  /auth/unlock:
    post:
      consumes:
      - application/json
      description: Verify Auth Key hash (Vault Key proof). Returns wrapped DEK + keypair
        on success.
      parameters:
      - description: Auth Key hash (base64)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.UnlockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.UnlockResponse'
        "403":
          description: Wrong Vault Key
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Unlock vault
      tags:
      - auth
  /orgs:
    get:
      description: List all organizations the current user is a member of.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ListOrgsResponse'
      security:
      - SessionAuth: []
      summary: List organizations
      tags:
      - organizations
    post:
      consumes:
      - application/json
      description: Create an organization. The creating user becomes the owner and
        is added as an admin member.
      parameters:
      - description: Organization name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.CreateOrgRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api_internal_handler.OrgResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Create organization
      tags:
      - organizations
  /orgs/{orgID}:
    get:
      description: Get a single organization by ID.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.OrgResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Get organization
      tags:
      - organizations
  /orgs/{orgID}/members:
    get:
      description: List all members of an organization with their roles.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ListMembersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: List organization members
      tags:
      - organizations
    post:
      consumes:
      - application/json
      description: Add a user to an organization with a specified role.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: User and role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.AddMemberRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api_internal_handler.MemberResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Add organization member
      tags:
      - organizations
  /orgs/{orgID}/members/{memberID}:
    delete:
      description: Remove a member from an organization.
      parameters:
      - description: Organization UUID
        in: path
        name: orgID
        required: true
        type: string
      - description: Member UUID
        in: path
        name: memberID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Remove organization member
      tags:
      - organizations
  /projects:
    get:
      description: List all projects in an organization.
      parameters:
      - description: Organization ID
        in: query
        name: organization_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ListProjectsResponse'
      security:
      - SessionAuth: []
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Create a project with client-generated crypto material. Project
        Vault Key shown once at creation, never stored on server.
      parameters:
      - description: Project config + crypto material
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.CreateProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api_internal_handler.ProjectResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Create project
      tags:
      - projects
  /projects/{projectID}:
    get:
      description: Get a single project by ID.
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ProjectResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Get project
      tags:
      - projects
  /sdk/projects/{projectID}/crypto:
    get:
      description: Returns project salt and wrapped Project DEK. SDK uses this to
        derive Project KEK and unwrap DEK.
      parameters:
      - description: Project UUID
        in: path
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ProjectCryptoResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get project crypto
      tags:
      - projects
  /sdk/secrets:
    get:
      description: List secret metadata (name hash, version, updated_at). Never returns
        ciphertext.
      parameters:
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Environment
        in: query
        name: environment
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ListSecretsResponse'
      security:
      - BearerAuth: []
      summary: List secrets
      tags:
      - secrets
    post:
      consumes:
      - application/json
      description: Store an encrypted vault item. Server stores opaque ciphertext
        only.
      parameters:
      - description: Encrypted secret
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.CreateSecretRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api_internal_handler.SecretResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create secret
      tags:
      - secrets
  /sdk/secrets/{nameHash}:
    delete:
      description: Remove a secret from the vault.
      parameters:
      - description: HMAC-SHA256 name hash
        in: path
        name: nameHash
        required: true
        type: string
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Environment
        in: query
        name: environment
        required: true
        type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete secret
      tags:
      - secrets
    get:
      description: Retrieve a single encrypted secret by name hash.
      parameters:
      - description: HMAC-SHA256 name hash (base64)
        in: path
        name: nameHash
        required: true
        type: string
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Environment (development/staging/production)
        in: query
        name: environment
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.SecretResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get secret
      tags:
      - secrets
    put:
      consumes:
      - application/json
      description: Update ciphertext and nonce. Version auto-incremented.
      parameters:
      - description: HMAC-SHA256 name hash
        in: path
        name: nameHash
        required: true
        type: string
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Environment
        in: query
        name: environment
        required: true
        type: string
      - description: New ciphertext
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.UpdateSecretRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.SecretResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update secret
      tags:
      - secrets
  /sdk/secrets/{nameHash}/rollback:
    post:
      consumes:
      - application/json
      description: Revert a secret to a previous version. The current version is archived
        first.
      parameters:
      - description: HMAC-SHA256 name hash
        in: path
        name: nameHash
        required: true
        type: string
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Environment
        in: query
        name: environment
        required: true
        type: string
      - description: Target version
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.RollbackRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.SecretResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Rollback secret
      tags:
      - secrets
  /sdk/secrets/{nameHash}/versions:
    get:
      description: Show version history for a secret. Returns version numbers and
        timestamps.
      parameters:
      - description: HMAC-SHA256 name hash
        in: path
        name: nameHash
        required: true
        type: string
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Environment
        in: query
        name: environment
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.VersionsResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List secret versions
      tags:
      - secrets
  /sdk/secrets/bulk:
    post:
      consumes:
      - application/json
      description: Fetch multiple secrets by name hashes. Used by SDK for schema manifest
        loading.
      parameters:
      - description: Name hashes to fetch
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.BulkFetchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_internal_handler.SecretResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Bulk fetch secrets
      tags:
      - secrets
  /tokens:
    get:
      description: List all tokens for a project. Never exposes token hash or plaintext.
      parameters:
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.ListTokensResponse'
      security:
      - SessionAuth: []
      summary: List service tokens
      tags:
      - tokens
    post:
      consumes:
      - application/json
      description: Generate a scoped service token. Plaintext shown once, SHA-256
        hashed before storage.
      parameters:
      - description: Token config
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.CreateTokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api_internal_handler.CreateTokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Create service token
      tags:
      - tokens
  /tokens/{tokenID}:
    delete:
      description: Marks a service token as revoked. Immediate effect.
      parameters:
      - description: Token UUID
        in: path
        name: tokenID
        required: true
        type: string
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Revoke service token
      tags:
      - tokens
securityDefinitions:
  BearerAuth:
    description: 'Service token: "Bearer svc_..."'
    in: header
    name: Authorization
    type: apiKey
  SessionAuth:
    in: cookie
    name: session_id
    type: apiKey
swagger: "2.0"
