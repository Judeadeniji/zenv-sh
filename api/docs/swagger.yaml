basePath: /v1
definitions:
  api_internal_handler.AddMemberRequest:
    properties:
      role:
        description: admin, senior_dev, dev, contractor, ci_bot
        type: string
      user_id:
        type: string
    type: object
  api_internal_handler.ApproveRecoveryRequest:
    properties:
      recovery_payload:
        description: base64
        type: string
    type: object
  api_internal_handler.AuditLogEntry:
    properties:
      action:
        type: string
      actor_email:
        type: string
      created_at:
        type: string
      id:
        type: string
      ip:
        type: string
      metadata:
        description: JSON string
        type: string
      project_id:
        type: string
      result:
        type: string
      secret_hash:
        description: base64
        type: string
      token_id:
        type: string
      user_id:
        type: string
    type: object
  api_internal_handler.AuditLogListResponse:
    properties:
      entries:
        items:
          $ref: '#/definitions/api_internal_handler.AuditLogEntry'
        type: array
      meta:
        $ref: '#/definitions/api_internal_handler.Meta'
    type: object
  api_internal_handler.BulkFetchRequest:
    properties:
      environment:
        type: string
      name_hashes:
        description: base64-encoded HMAC hashes
        items:
          type: string
        type: array
      project_id:
        type: string
    type: object
  api_internal_handler.ChangeVaultKeyRequest:
    properties:
      current_auth_key_hash:
        description: base64
        type: string
      new_auth_key_hash:
        description: base64
        type: string
      new_salt:
        description: base64
        type: string
      new_vault_key_type:
        description: '"pin" or "passphrase"'
        type: string
      new_wrapped_dek:
        description: base64
        type: string
      new_wrapped_private_key:
        description: base64
        type: string
    type: object
  api_internal_handler.CommitRotationRequest:
    properties:
      new_key_grants:
        items:
          properties:
            user_id:
              type: string
            wrapped_project_vault_key:
              description: base64
              type: string
          type: object
        type: array
      new_project_salt:
        description: base64
        type: string
      new_wrapped_project_dek:
        description: base64
        type: string
    type: object
  api_internal_handler.CompleteRecoveryRequest:
    properties:
      new_auth_key_hash:
        type: string
      new_recovery_wrapped_dek:
        type: string
      new_salt:
        type: string
      new_vault_key_type:
        type: string
      new_wrapped_dek:
        type: string
      new_wrapped_private_key:
        type: string
      request_id:
        type: string
    type: object
  api_internal_handler.CreateOrgRequest:
    properties:
      name:
        type: string
    type: object
  api_internal_handler.CreateProjectRequest:
    properties:
      name:
        type: string
      organization_id:
        type: string
      project_salt:
        description: base64 — generated client-side
        type: string
      wrapped_project_dek:
        description: base64 — Project DEK wrapped with Project KEK
        type: string
      wrapped_project_vault_key:
        description: base64 — Project Vault Key wrapped with user's public key
        type: string
    type: object
  api_internal_handler.CreateSecretRequest:
    properties:
      ciphertext:
        description: base64 AES-256-GCM encrypted item JSON
        type: string
      environment:
        type: string
      name_hash:
        description: base64 HMAC-SHA256 of secret name
        type: string
      nonce:
        description: base64 96-bit nonce
        type: string
      project_id:
        type: string
    type: object
  api_internal_handler.CreateTokenRequest:
    properties:
      environment:
        description: development | staging | production
        type: string
      expires_at:
        description: optional RFC3339
        type: string
      name:
        type: string
      permission:
        description: read | read_write
        type: string
      project_id:
        type: string
    type: object
  api_internal_handler.CreateTokenResponse:
    properties:
      created_at:
        type: string
      environment:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      permission:
        type: string
      project_id:
        type: string
      token:
        description: shown exactly once — never stored
        type: string
    type: object
  api_internal_handler.DisableRecoveryRequest:
    properties:
      disabled:
        type: boolean
    type: object
  api_internal_handler.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  api_internal_handler.IncomingRequest:
    properties:
      eligible_at:
        type: string
      request_id:
        type: string
      requested_at:
        type: string
      status:
        type: string
      user_email:
        type: string
    type: object
  api_internal_handler.InitiateRecoveryRequest:
    properties:
      recovery_public_key:
        description: base64
        type: string
    type: object
  api_internal_handler.KeyGrantMember:
    properties:
      public_key:
        description: base64
        type: string
      user_id:
        type: string
    type: object
  api_internal_handler.KeyGrantResponse:
    properties:
      wrapped_project_vault_key:
        description: base64
        type: string
    type: object
  api_internal_handler.ListKeyGrantsResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/api_internal_handler.KeyGrantMember'
        type: array
    type: object
  api_internal_handler.ListMembersResponse:
    properties:
      members:
        items:
          $ref: '#/definitions/api_internal_handler.MemberResponse'
        type: array
      meta:
        $ref: '#/definitions/api_internal_handler.Meta'
    type: object
  api_internal_handler.ListOrgsResponse:
    properties:
      meta:
        $ref: '#/definitions/api_internal_handler.Meta'
      organizations:
        items:
          $ref: '#/definitions/api_internal_handler.OrgResponse'
        type: array
    type: object
  api_internal_handler.ListProjectsResponse:
    properties:
      meta:
        $ref: '#/definitions/api_internal_handler.Meta'
      projects:
        items:
          $ref: '#/definitions/api_internal_handler.ProjectResponse'
        type: array
    type: object
  api_internal_handler.ListSecretsResponse:
    properties:
      secrets:
        items:
          $ref: '#/definitions/api_internal_handler.SecretListItem'
        type: array
    type: object
  api_internal_handler.ListTokensResponse:
    properties:
      meta:
        $ref: '#/definitions/api_internal_handler.Meta'
      tokens:
        items:
          $ref: '#/definitions/api_internal_handler.TokenListItem'
        type: array
    type: object
  api_internal_handler.MeResponse:
    properties:
      email:
        type: string
      name:
        type: string
      salt:
        description: base64
        type: string
      vault_key_type:
        type: string
      vault_setup_complete:
        type: boolean
      vault_unlocked:
        type: boolean
    type: object
  api_internal_handler.MemberResponse:
    properties:
      email:
        type: string
      id:
        type: string
      joined_at:
        type: string
      role:
        type: string
      user_id:
        type: string
    type: object
  api_internal_handler.Meta:
    properties:
      page:
        type: integer
      per_page:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  api_internal_handler.OrgResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
    type: object
  api_internal_handler.ProjectCryptoResponse:
    properties:
      project_salt:
        description: base64
        type: string
      vault_key_type:
        description: '"pin" or "passphrase"'
        type: string
      wrapped_project_dek:
        description: base64
        type: string
    type: object
  api_internal_handler.ProjectResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      name:
        type: string
      organization_id:
        type: string
    type: object
  api_internal_handler.PublicKeyResponse:
    properties:
      email:
        type: string
      public_key:
        description: base64
        type: string
    type: object
  api_internal_handler.RecoverWithKitRequest:
    properties:
      new_auth_key_hash:
        type: string
      new_recovery_wrapped_dek:
        type: string
      new_salt:
        type: string
      new_vault_key_type:
        type: string
      new_wrapped_dek:
        type: string
      new_wrapped_private_key:
        type: string
    type: object
  api_internal_handler.RecoveryKitResponse:
    properties:
      recovery_wrapped_dek:
        description: base64
        type: string
    type: object
  api_internal_handler.RecoveryRequestStatusResponse:
    properties:
      eligible_at:
        type: string
      has_payload:
        type: boolean
      request_id:
        type: string
      requested_at:
        type: string
      status:
        type: string
    type: object
  api_internal_handler.RecoveryStatusResponse:
    properties:
      contact_email:
        type: string
      has_contact:
        type: boolean
      has_kit:
        type: boolean
      recovery_disabled:
        type: boolean
    type: object
  api_internal_handler.RegenerateKitRequest:
    properties:
      recovery_wrapped_dek:
        description: base64
        type: string
    type: object
  api_internal_handler.RollbackRequest:
    properties:
      version:
        type: integer
    type: object
  api_internal_handler.SecretListItem:
    properties:
      environment:
        type: string
      id:
        type: string
      name_hash:
        type: string
      updated_at:
        type: string
      version:
        type: integer
    type: object
  api_internal_handler.SecretResponse:
    properties:
      ciphertext:
        type: string
      created_at:
        type: string
      environment:
        type: string
      id:
        type: string
      name_hash:
        type: string
      nonce:
        type: string
      project_id:
        type: string
      updated_at:
        type: string
      version:
        type: integer
    type: object
  api_internal_handler.SetTrustedContactRequest:
    properties:
      contact_email:
        type: string
      trusted_wrapped_dek:
        description: base64
        type: string
    type: object
  api_internal_handler.SetupVaultRequest:
    properties:
      auth_key_hash:
        description: base64
        type: string
      public_key:
        description: base64
        type: string
      recovery_disabled:
        description: enterprise opt-in to disable recovery
        type: boolean
      recovery_wrapped_dek:
        description: base64, optional — DEK wrapped with recovery key
        type: string
      salt:
        description: base64
        type: string
      vault_key_type:
        description: '"pin" or "passphrase"'
        type: string
      wrapped_dek:
        description: base64
        type: string
      wrapped_private_key:
        description: base64
        type: string
    type: object
  api_internal_handler.SetupVaultResponse:
    properties:
      user_id:
        type: string
      vault_setup_complete:
        type: boolean
    type: object
  api_internal_handler.StageItem:
    properties:
      new_ciphertext:
        description: base64
        type: string
      new_nonce:
        description: base64
        type: string
      vault_item_id:
        type: string
    type: object
  api_internal_handler.StageRequest:
    properties:
      items:
        items:
          $ref: '#/definitions/api_internal_handler.StageItem'
        type: array
    type: object
  api_internal_handler.StageResponse:
    properties:
      staged:
        type: integer
      total:
        type: integer
      total_staged:
        type: integer
    type: object
  api_internal_handler.StartRotationRequest:
    properties:
      total_items:
        type: integer
    type: object
  api_internal_handler.StartRotationResponse:
    properties:
      rotation_id:
        type: string
      status:
        type: string
    type: object
  api_internal_handler.TokenListItem:
    properties:
      created_at:
        type: string
      environment:
        type: string
      expires_at:
        type: string
      id:
        type: string
      name:
        type: string
      permission:
        type: string
      project_id:
        type: string
      revoked_at:
        type: string
    type: object
  api_internal_handler.UnlockRequest:
    properties:
      auth_key_hash:
        description: base64
        type: string
    type: object
  api_internal_handler.UnlockResponse:
    properties:
      public_key:
        description: base64
        type: string
      wrapped_dek:
        description: base64
        type: string
      wrapped_private_key:
        description: base64
        type: string
    type: object
  api_internal_handler.UpdateSecretRequest:
    properties:
      ciphertext:
        description: base64
        type: string
      nonce:
        description: base64
        type: string
    type: object
  api_internal_handler.VaultMaterialResponse:
    properties:
      public_key:
        description: base64
        type: string
      salt:
        description: base64
        type: string
      vault_key_type:
        description: '"pin" or "passphrase"'
        type: string
      wrapped_dek:
        description: base64
        type: string
      wrapped_private_key:
        description: base64
        type: string
    type: object
  api_internal_handler.VersionItem:
    properties:
      created_at:
        type: string
      version:
        type: integer
    type: object
  api_internal_handler.VersionsResponse:
    properties:
      current_version:
        type: integer
      versions:
        items:
          $ref: '#/definitions/api_internal_handler.VersionItem'
        type: array
    type: object
  api_internal_handler.WhoamiResponse:
    properties:
      environment:
        type: string
      organization_id:
        type: string
      organization_name:
        type: string
      permission:
        type: string
      project_id:
        type: string
      project_name:
        type: string
      token_name:
        type: string
      user_email:
        type: string
      user_name:
        type: string
    type: object
host: api.zenv.sh
info:
  contact: {}
  description: Zero-knowledge secret manager API. Stores and retrieves ciphertext.
    Never decrypts.
  title: zEnv API
  version: 0.1.0
paths:
  /audit-logs:
    get:
      description: Query audit log entries with filters. Requires project_id.
      parameters:
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Filter by action (e.g. secret.read)
        in: query
        name: action
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by result (success, denied, error)
        in: query
        name: result
        type: string
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 50, max 100)
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.AuditLogListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: List audit logs
      tags:
      - audit
  /audit-logs/drain:
    post:
      description: Force-flush all queued audit events from Redis to Postgres.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: integer
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Drain audit queue
      tags:
      - audit
  /audit-logs/export:
    get:
      description: Export filtered audit log entries as a CSV file.
      parameters:
      - description: Project ID
        in: query
        name: project_id
        required: true
        type: string
      - description: Start date (RFC3339)
        in: query
        name: start_date
        type: string
      - description: End date (RFC3339)
        in: query
        name: end_date
        type: string
      - description: Filter by action
        in: query
        name: action
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by result
        in: query
        name: result
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: OK
      security:
      - SessionAuth: []
      summary: Export audit logs as CSV
      tags:
      - audit
  /auth/change-vault-key:
    put:
      consumes:
      - application/json
      description: 'Rotate vault key: verify current auth key, store new crypto material.
        O(1) — no item rows touched.'
      parameters:
      - description: Current auth proof + new crypto material
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.ChangeVaultKeyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "403":
          description: Wrong current Vault Key
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Change vault key
      tags:
      - auth
  /auth/me:
    get:
      description: Returns identity, vault setup status, and vault lock state.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.MeResponse'
      security:
      - SessionAuth: []
      summary: Get auth state
      tags:
      - auth
  /auth/recovery/disable:
    put:
      consumes:
      - application/json
      description: Set recovery_disabled to true or false. When disabled, recovery
        kit and trusted contact cannot be used.
      parameters:
      - description: Toggle recovery
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.DisableRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionAuth: []
      summary: Toggle recovery disabled
      tags:
      - recovery
  /auth/recovery/incoming-requests:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/api_internal_handler.IncomingRequest'
            type: array
      security:
      - SessionAuth: []
      summary: Incoming recovery requests
      tags:
      - recovery
  /auth/recovery/kit:
    get:
      description: Returns the recovery-wrapped DEK so the client can attempt recovery.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.RecoveryKitResponse'
        "403":
          description: Recovery disabled
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "404":
          description: No recovery kit
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Get recovery kit material
      tags:
      - recovery
    put:
      consumes:
      - application/json
      description: Replaces the recovery-wrapped DEK with a new one. Old recovery
        words are invalidated.
      parameters:
      - description: New recovery wrapped DEK
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.RegenerateKitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
        "403":
          description: Recovery disabled
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Regenerate recovery kit
      tags:
      - recovery
  /auth/recovery/kit/recover:
    post:
      consumes:
      - application/json
      description: Client verified recovery words, unwrapped DEK, set new Vault Key.
        Submit new crypto material.
      parameters:
      - description: New crypto material
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.RecoverWithKitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/api_internal_handler.ErrorResponse'
      security:
      - SessionAuth: []
      summary: Recover with Recovery Kit
      tags:
      - recovery
  /auth/recovery/request:
    delete:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionAuth: []
      summary: Cancel recovery request
      tags:
      - recovery
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.RecoveryRequestStatusResponse'
      security:
      - SessionAuth: []
      summary: Recovery request status
      tags:
      - recovery
    post:
      consumes:
      - application/json
      description: Start 72-hour waiting period for trusted contact recovery.
      parameters:
      - description: Ephemeral public key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.InitiateRecoveryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      security:
      - SessionAuth: []
      summary: Initiate recovery request
      tags:
      - recovery
  /auth/recovery/request/{id}/approve:
    post:
      consumes:
      - application/json
      description: Trusted contact provides DEK re-wrapped with recovering user's
        ephemeral key.
      parameters:
      - description: Recovery request ID
        in: path
        name: id
        required: true
        type: string
      - description: Recovery payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.ApproveRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionAuth: []
      summary: Approve recovery request
      tags:
      - recovery
  /auth/recovery/request/{id}/complete:
    post:
      consumes:
      - application/json
      parameters:
      - description: Recovery request ID
        in: path
        name: id
        required: true
        type: string
      - description: New crypto material
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api_internal_handler.CompleteRecoveryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionAuth: []
      summary: Complete trusted contact recovery
      tags:
      - recovery
  /auth/recovery/status:
    get:
      description: Returns which recovery methods are available for this user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api_internal_handler.RecoveryStatusResponse'
      security:
      - SessionAuth: []
      summary: Recovery status
      tags:
      - recovery
  /auth/recovery/trusted-contact:
    delete:
      produces:
      - application/json
      responses:
